name: Update Schedule

on:
  push:
    branches: [main, dev]
  schedule:
    - cron: '*/15 0-4,14-23 18-23 3 *'  # Mar 18-23
    - cron: '*/15 0-4,14-23 27-30 3 *'  # Mar 27-30
    - cron: '*/15 0-4,14-23 3,5 4 *'    # Apr 3 & 5
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python update_schedule.py

      - name: Commit updated index.html
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update schedule"
          git push
